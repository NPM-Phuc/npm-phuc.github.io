<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Mandarin favicon">
  <defs>
    <radialGradient id="mandarinGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fffaf3" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#ff9a2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="1"/>
    </radialGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- background (transparent to keep circular favicon) -->
  <rect width="64" height="64" fill="none"/>

  <!-- mandarin body -->
  <g filter="url(#drop)">
    <circle cx="32" cy="32" r="20" fill="url(#mandarinGrad)" stroke="#e05900" stroke-width="1.2"/>

    <!-- subtle segment separators -->
    <g transform="translate(32,32)" fill="#ffffff" fill-opacity="0.12">
      <path d="M0-12 L5 -4 L0 12 L-5 -4 Z" transform="rotate(0)"/>
      <path d="M0-12 L5 -4 L0 12 L-5 -4 Z" transform="rotate(60)"/>
      <path d="M0-12 L5 -4 L0 12 L-5 -4 Z" transform="rotate(120)"/>
      <path d="M0-12 L5 -4 L0 12 L-5 -4 Z" transform="rotate(180)"/>
      <path d="M0-12 L5 -4 L0 12 L-5 -4 Z" transform="rotate(240)"/>
      <path d="M0-12 L5 -4 L0 12 L-5 -4 Z" transform="rotate(300)"/>
    </g>

    <!-- central highlight -->
    <ellipse cx="32" cy="28" rx="4.2" ry="4" fill="#fff" fill-opacity="0.85"/>
  </g>

  <!-- small leaf -->
  <g transform="translate(38,18) rotate(-22)">
    <!-- leaf updated to forest green to match site palette -->
    <path d="M0 0c5-3 11-1 13 3 2 4-1 8-5 10-2 1-5 1-7-1-3-3-4-8-1-12z" fill="#0f5132"/>
    <path d="M3 2c2-1 5-1 7 1" stroke="#0b3d26" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
